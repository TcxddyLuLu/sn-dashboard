<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effect Preview - 10 / 11 / Combined</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    padding: 24px;
  }
  .page { max-width: 1000px; margin: 0 auto; }

  h1 { font-size: 20px; margin-bottom: 24px; color: #1e3a5f; }
  .section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 15px; font-weight: 700; color: #1e3a5f;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e2e8f0;
  }
  .section-title span { font-size: 12px; color: #94a3b8; font-weight: 400; margin-left: 8px; }

  /* --- Shared table styles --- */
  table {
    border-collapse: collapse; width: 100%; font-size: 13px;
  }
  th {
    background: #1e3a5f; color: #fff;
    padding: 8px 10px; font-weight: 600; text-align: center; white-space: nowrap;
  }
  th:first-child { text-align: left; }
  th.current-week {
    background: #2563eb;
    box-shadow: inset 0 -3px 0 #60a5fa;
  }
  td {
    padding: 6px 10px; text-align: center;
    border-bottom: 1px solid #f1f5f9;
  }
  td:first-child {
    text-align: left; font-weight: 500; color: #334155; white-space: nowrap;
  }
  td:last-child { font-weight: 700; }
  tr:hover td { background: #f8fafc !important; }
  tfoot td {
    font-weight: 700; border-top: 2px solid #e2e8f0;
    background: #f8fafc !important;
  }

  /* --- Effect 10: Zero total warning --- */
  .warn-zero td:first-child {
    color: #dc2626;
  }
  .warn-zero td:first-child::after {
    content: ' \26A0';
    color: #dc2626;
    font-size: 14px;
    margin-left: 4px;
  }
  .warn-zero {
    background: #fef2f2 !important;
  }
  .warn-zero td {
    background: #fef2f2 !important;
  }

  /* --- Effect 11: Blinking current week zero --- */
  @keyframes blink-warn {
    0%, 100% { background: transparent; }
    50% { background: rgba(255, 23, 68, 0.12); }
  }
  .blink-zero {
    animation: blink-warn 2s ease-in-out infinite;
    color: #ff1744 !important;
    font-weight: 700 !important;
  }

  /* --- Normal zero (for past/current weeks) --- */
  .zero { color: #ff1744; font-weight: 700; }
</style>
</head>
<body>
<div class="page">

<h1>Effect Preview</h1>

<!-- ============== EFFECT 10 ONLY ============== -->
<div class="section">
  <div class="section-title">Effect 10: Zero Total Warning <span>本月总单量为0的员工整行标红 + 警告标记</span></div>
  <table id="table10"></table>
</div>

<!-- ============== EFFECT 11 ONLY ============== -->
<div class="section">
  <div class="section-title">Effect 11: Current Week Blinking <span>当前周为0的格子缓慢闪烁</span></div>
  <table id="table11"></table>
</div>

<!-- ============== BOTH 10 + 11 ============== -->
<div class="section">
  <div class="section-title">Combined: 10 + 11 <span>两个效果同时应用</span></div>
  <table id="tableBoth"></table>
</div>

</div>

<script>
var WEEKS = ['6/29-7/5', '7/6-12', '7/13-19', '7/20-26', '7/27-8/2'];
var CW = 1;

var DATA = [
  { employee: 'Alex Xu',       weekly: [38, 0, 0, 0, 0], total: 38 },
  { employee: 'Hooxi Zhu',     weekly: [23, 11, 0, 0, 0], total: 34 },
  { employee: 'Ping Wang',     weekly: [28, 6, 0, 0, 0], total: 34 },
  { employee: 'He Feng',       weekly: [11, 17, 0, 0, 0], total: 28 },
  { employee: 'Andy Lan',      weekly: [17, 1, 0, 0, 0], total: 18 },
  { employee: 'Bob Liu',       weekly: [3, 12, 0, 0, 0], total: 15 },
  { employee: 'Luby Lu',       weekly: [0, 5, 0, 0, 0], total: 5 },
  { employee: 'Yin Ye',        weekly: [3, 0, 0, 0, 0], total: 3 },
  { employee: 'Freddie Liu',   weekly: [0, 0, 0, 0, 0], total: 0 },
  { employee: 'Guichong You',  weekly: [0, 0, 0, 0, 0], total: 0 },
  { employee: 'Yong Zhao',     weekly: [0, 0, 0, 0, 0], total: 0 },
];

function buildTable(targetId, use10, use11) {
  var sorted = DATA.slice().sort(function(a, b) {
    return b.total - a.total || a.employee.localeCompare(b.employee);
  });

  var maxVal = 0;
  sorted.forEach(function(d) {
    d.weekly.forEach(function(v) { if (v > maxVal) maxVal = v; });
  });

  var html = '<thead><tr><th>Employee</th>';
  WEEKS.forEach(function(w, i) {
    var cls = (i === CW) ? ' class="current-week"' : '';
    html += '<th' + cls + '>W' + (i + 1) + '<br><span style="font-weight:400;font-size:11px;opacity:.8">' + w + '</span></th>';
  });
  html += '<th>Total</th></tr></thead>';

  html += '<tbody>';
  sorted.forEach(function(emp) {
    var isZeroTotal = emp.total === 0;
    var rowClass = (use10 && isZeroTotal) ? ' class="warn-zero"' : '';
    html += '<tr' + rowClass + '>';
    html += '<td>' + emp.employee + '</td>';

    emp.weekly.forEach(function(v, ci) {
      var style = '';
      var cls = '';

      if (v > 0) {
        var intensity = Math.min(v / Math.max(maxVal, 1), 1);
        var alpha = (0.12 + intensity * 0.38).toFixed(2);
        style = ' style="background:rgba(34,197,94,' + alpha + ')"';
      } else if (ci <= CW) {
        if (use11 && ci === CW && !isZeroTotal) {
          cls = ' class="blink-zero"';
        } else if (ci <= CW) {
          cls = ' class="zero"';
        }
      }

      html += '<td' + style + cls + '>' + v + '</td>';
    });

    var totalCls = isZeroTotal ? ' class="zero"' : '';
    html += '<td' + totalCls + '>' + emp.total + '</td>';
    html += '</tr>';
  });
  html += '</tbody>';

  var weekTotals = WEEKS.map(function(_, i) {
    return sorted.reduce(function(s, d) { return s + d.weekly[i]; }, 0);
  });
  var grandTotal = weekTotals.reduce(function(s, v) { return s + v; }, 0);
  html += '<tfoot><tr><td>TOTAL</td>';
  weekTotals.forEach(function(v) { html += '<td>' + v + '</td>'; });
  html += '<td>' + grandTotal + '</td></tr></tfoot>';

  document.getElementById(targetId).innerHTML = html;
}

buildTable('table10', true, false);
buildTable('table11', false, true);
buildTable('tableBoth', true, true);
</script>
</body>
</html>
