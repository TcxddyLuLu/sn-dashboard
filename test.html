<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Effect Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    padding: 24px;
  }
  .page { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 8px; color: #1e3a5f; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }

  .section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    margin-bottom: 28px;
    position: relative;
  }
  .section-title {
    font-size: 15px; font-weight: 700; color: #1e3a5f;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e2e8f0;
  }
  .section-title span { font-size: 12px; color: #94a3b8; font-weight: 400; margin-left: 8px; }

  .table-wrap { position: relative; overflow: visible; }

  table {
    border-collapse: collapse; width: 100%; font-size: 13px;
  }
  th {
    background: #1e3a5f; color: #fff;
    padding: 8px 10px; font-weight: 600; text-align: center; white-space: nowrap;
  }
  th:first-child { text-align: left; }
  th.current-week {
    background: #2563eb;
    box-shadow: inset 0 -3px 0 #60a5fa;
  }
  td {
    padding: 6px 10px; text-align: center;
    border-bottom: 1px solid #f1f5f9;
  }
  td:first-child {
    text-align: left; font-weight: 500; color: #334155; white-space: nowrap;
  }
  td:last-child { font-weight: 700; }
  tfoot td {
    font-weight: 700; border-top: 2px solid #e2e8f0;
    background: #f8fafc !important;
  }
  .zero { color: #ff1744; font-weight: 700; }
  .warn-zero td { background: #fef2f2 !important; }
  .warn-zero td:first-child { color: #334155; }

  .arrow-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
<div class="page">

<h1>Arrow Effect Preview</h1>
<p class="subtitle">本周单量为 0 时，从 "0" 向员工名字引出红色箭头，周一到周五由细到粗</p>

<div class="section" id="sec1">
  <div class="section-title">Monday (周一) <span>箭头最细 — 1px</span></div>
  <div class="table-wrap" id="wrap1"><table id="t1"></table></div>
</div>

<div class="section" id="sec2">
  <div class="section-title">Wednesday (周三) <span>箭头中等粗 — 3px</span></div>
  <div class="table-wrap" id="wrap2"><table id="t2"></table></div>
</div>

<div class="section" id="sec3">
  <div class="section-title">Friday (周五) <span>箭头最粗 — 5px</span></div>
  <div class="table-wrap" id="wrap3"><table id="t3"></table></div>
</div>

</div>

<script>
var WEEKS = ['6/29-7/5', '7/6-12', '7/13-19', '7/20-26', '7/27-8/2'];
var CW = 1;

var DATA = [
  { employee: 'Alex Xu',       weekly: [38, 0, 0, 0, 0], total: 38 },
  { employee: 'Hooxi Zhu',     weekly: [23, 11, 0, 0, 0], total: 34 },
  { employee: 'Ping Wang',     weekly: [28, 6, 0, 0, 0], total: 34 },
  { employee: 'He Feng',       weekly: [11, 17, 0, 0, 0], total: 28 },
  { employee: 'Andy Lan',      weekly: [17, 1, 0, 0, 0], total: 18 },
  { employee: 'Bob Liu',       weekly: [3, 12, 0, 0, 0], total: 15 },
  { employee: 'Luby Lu',       weekly: [0, 5, 0, 0, 0], total: 5 },
  { employee: 'Yin Ye',        weekly: [3, 0, 0, 0, 0], total: 3 },
  { employee: 'Freddie Liu',   weekly: [0, 0, 0, 0, 0], total: 0 },
  { employee: 'Guichong You',  weekly: [0, 0, 0, 0, 0], total: 0 },
];

function buildTable(tableId, wrapId) {
  var sorted = DATA.slice().sort(function(a, b) {
    return b.total - a.total || a.employee.localeCompare(b.employee);
  });

  var html = '<thead><tr><th>Employee</th>';
  WEEKS.forEach(function(w, i) {
    var cls = (i === CW) ? ' class="current-week"' : '';
    html += '<th' + cls + '>W' + (i+1) + '<br><span style="font-weight:400;font-size:11px;opacity:.8">' + w + '</span></th>';
  });
  html += '<th>Total</th></tr></thead><tbody>';

  sorted.forEach(function(emp, ri) {
    var isZeroTotal = emp.total === 0;
    var isExempt = emp.employee === 'Luby Lu';
    var rowCls = (isZeroTotal && !isExempt) ? ' class="warn-zero"' : '';
    html += '<tr' + rowCls + '>';
    html += '<td class="name-cell" data-row="' + ri + '"><span class="name-text">' + emp.employee + '</span></td>';

    emp.weekly.forEach(function(v, ci) {
      var extra = '';
      if (ci === CW && v === 0 && !isExempt) {
        extra = ' data-arrow-row="' + ri + '"';
      }
      var cls = '';
      if (v === 0 && ci <= CW && !isExempt) cls = ' class="zero"';

      var style = '';
      if (v > 0) {
        var maxVal = 38;
        var intensity = Math.min(v / maxVal, 1);
        var alpha = (0.12 + intensity * 0.38).toFixed(2);
        style = ' style="background:rgba(34,197,94,' + alpha + ')"';
      }
      html += '<td' + style + cls + extra + '>' + v + '</td>';
    });

    var totalCls = (isZeroTotal && !isExempt) ? ' class="zero"' : '';
    html += '<td' + totalCls + '>' + emp.total + '</td></tr>';
  });
  html += '</tbody>';

  var weekTotals = WEEKS.map(function(_, i) {
    return sorted.reduce(function(s, d) { return s + d.weekly[i]; }, 0);
  });
  var gt = weekTotals.reduce(function(s,v){return s+v;},0);
  html += '<tfoot><tr><td>TOTAL</td>';
  weekTotals.forEach(function(v){html+='<td>'+v+'</td>';});
  html += '<td>'+gt+'</td></tr></tfoot>';

  document.getElementById(tableId).innerHTML = html;
}

function drawArrows(wrapId, thickness) {
  var wrap = document.getElementById(wrapId);
  var wrapRect = wrap.getBoundingClientRect();

  var cells = wrap.querySelectorAll('[data-arrow-row]');
  if (cells.length === 0) return;

  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class', 'arrow-svg');
  svg.style.width = wrap.offsetWidth + 'px';
  svg.style.height = wrap.offsetHeight + 'px';

  var markerId = 'arrowhead-' + wrapId + '-' + thickness;
  var defs = document.createElementNS(svgNS, 'defs');
  var marker = document.createElementNS(svgNS, 'marker');
  marker.setAttribute('id', markerId);
  var mSize = Math.max(4, thickness * 2);
  marker.setAttribute('markerWidth', mSize + 2);
  marker.setAttribute('markerHeight', mSize + 2);
  marker.setAttribute('refX', 1);
  marker.setAttribute('refY', (mSize + 2) / 2);
  marker.setAttribute('orient', 'auto');
  var poly = document.createElementNS(svgNS, 'polygon');
  var p1 = (mSize + 2) + ','+((mSize+2)/2);
  var p2 = '0,0';
  var p3 = '0,'+(mSize+2);
  poly.setAttribute('points', p2 + ' ' + p1 + ' ' + p3);
  poly.setAttribute('fill', '#ff1744');
  poly.setAttribute('opacity', '0.7');
  marker.appendChild(poly);
  defs.appendChild(marker);
  svg.appendChild(defs);

  cells.forEach(function(cell) {
    var rowIdx = cell.getAttribute('data-arrow-row');
    var nameCell = wrap.querySelector('.name-cell[data-row="' + rowIdx + '"]');
    if (!nameCell) return;

    var cellRect = cell.getBoundingClientRect();
    var nameRect = nameCell.getBoundingClientRect();

    var x1 = cellRect.left - wrapRect.left + 4;
    var y1 = cellRect.top - wrapRect.top + cellRect.height / 2;
    var nameSpan = nameCell.querySelector('.name-text');
    var spanRect = nameSpan.getBoundingClientRect();
    var x2 = spanRect.right - wrapRect.left + 3;
    var y2 = nameRect.top - wrapRect.top + nameRect.height / 2;

    var line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#ff1744');
    line.setAttribute('stroke-opacity', '0.55');
    line.setAttribute('stroke-width', thickness);
    line.setAttribute('marker-end', 'url(#' + markerId + ')');
    svg.appendChild(line);
  });

  wrap.appendChild(svg);
}

buildTable('t1', 'wrap1');
buildTable('t2', 'wrap2');
buildTable('t3', 'wrap3');

setTimeout(function() {
  drawArrows('wrap1', 1);
  drawArrows('wrap2', 3);
  drawArrows('wrap3', 5);
}, 100);

window.addEventListener('resize', function() {
  ['wrap1','wrap2','wrap3'].forEach(function(id) {
    var old = document.getElementById(id).querySelector('.arrow-svg');
    if (old) old.remove();
  });
  drawArrows('wrap1', 1);
  drawArrows('wrap2', 3);
  drawArrows('wrap3', 5);
});
</script>
</body>
</html>
