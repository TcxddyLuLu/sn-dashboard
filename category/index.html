<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Category Dashboard</title>
<link rel="preload" href="../chart.min.js" as="script">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 24px;
  }
  .dashboard { max-width: 1200px; margin: 0 auto; }

  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f766e 100%);
    color: #fff;
    padding: 28px 32px;
    border-radius: 16px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header .meta { text-align: right; }
  .header .month { font-size: 17px; opacity: .92; }
  .header .updated { font-size: 12px; opacity: .6; margin-top: 4px; }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 18px 20px;
    border: 1px solid #334155;
  }
  .card .label {
    font-size: 11px; color: #94a3b8; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .card .value { font-size: 32px; font-weight: 700; margin-top: 2px; }
  .card.total .value { color: #f1f5f9; }
  .card.cat .value   { color: #2dd4bf; }
  .card.emp .value   { color: #a78bfa; }

  .team-section {
    background: #1e293b;
    border-radius: 14px;
    padding: 24px;
    border: 1px solid #334155;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .team-section h3 {
    font-size: 16px; font-weight: 700; color: #f1f5f9;
    margin-bottom: 12px;
  }
  .team-radar-wrap {
    width: 320px;
    flex-shrink: 0;
  }
  .team-stats {
    flex: 1;
    min-width: 0;
  }
  .team-cat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .team-cat-dot {
    width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }
  .team-cat-name {
    font-size: 13px; color: #cbd5e1; width: 120px; flex-shrink: 0;
  }
  .team-cat-bar-bg {
    flex: 1; height: 14px; background: #334155; border-radius: 4px; overflow: hidden;
  }
  .team-cat-bar {
    height: 100%; border-radius: 4px; transition: width .6s;
  }
  .team-cat-count {
    font-size: 12px; color: #94a3b8; width: 50px; text-align: right; flex-shrink: 0;
  }

  .section-title {
    font-size: 16px; font-weight: 700; color: #94a3b8;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .emp-card {
    background: #1e293b;
    border-radius: 14px;
    padding: 20px;
    border: 1px solid #334155;
    transition: border-color .2s, transform .2s;
    position: relative;
  }
  .emp-card:hover { border-color: #2dd4bf; transform: translateY(-2px); }

  .emp-rank {
    position: absolute;
    top: 14px; right: 16px;
    font-size: 20px; font-weight: 800;
    color: #334155;
    line-height: 1;
  }
  .emp-rank.r1 { color: #eab308; }
  .emp-rank.r2 { color: #94a3b8; }
  .emp-rank.r3 { color: #b45309; }

  .emp-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .emp-name { font-size: 15px; font-weight: 700; color: #f1f5f9; }
  .emp-total { font-size: 13px; color: #64748b; font-weight: 500; }

  .radar-wrap {
    position: relative;
    width: 100%;
    max-width: 270px;
    margin: 0 auto;
  }

  .top-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
    margin-top: 8px;
    justify-content: center;
  }
  .top-cat {
    font-size: 12px;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .top-cat .medal { font-size: 13px; }
  .top-cat .pct { font-weight: 600; color: #2dd4bf; }

  .legend-hint {
    text-align: center;
    font-size: 11px;
    color: #475569;
    margin-top: 20px;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 16px;
    font-size: 13px;
    color: #64748b;
    text-decoration: none;
  }
  .back-link:hover { color: #2dd4bf; }

  @media (max-width: 700px) {
    body { padding: 12px; }
    .header { flex-direction: column; text-align: center; gap: 8px; }
    .header .meta { text-align: center; }
    .summary-row { grid-template-columns: 1fr; }
    .team-section { flex-direction: column; }
    .team-radar-wrap { width: 100%; max-width: 280px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="dashboard">
  <a class="back-link" href="../">&larr; Back to Monthly Dashboard</a>

  <div class="header">
    <h1>Ticket Category Dashboard</h1>
    <div class="meta">
      <div class="month" id="monthLabel"></div>
      <div class="updated" id="updatedTime">Updated: 2026/7/20 16:00</div>
    </div>
  </div>

  <div class="summary-row">
    <div class="card total"><div class="label">Total Tickets</div><div class="value" id="totalVal">0</div></div>
    <div class="card cat"><div class="label">Categories</div><div class="value" id="catVal">0</div></div>
    <div class="card emp"><div class="label">Active Employees</div><div class="value" id="empVal">0</div></div>
  </div>

  <div class="team-section">
    <div class="team-radar-wrap"><canvas id="teamRadar"></canvas></div>
    <div class="team-stats">
      <h3>Team Overview</h3>
      <div id="teamBars"></div>
    </div>
  </div>

  <div class="section-title">Individual Profiles</div>
  <div class="grid" id="empGrid"></div>

  <div class="legend-hint">Dashed line = team average &middot; Hover radar points for details</div>
</div>

<script>
let CATEGORY_DATA = {"axes": ["Daily Health Check", "Device (LC)", "New Hire Setup", "Windows", "O365", "Account / Auth", "Mac", "NikePrint", "Meeting Support", "Mobile"], "employees": [{"id": "HZh8", "name": "Hooxi Zhu", "total": 104, "counts": [0, 0, 29, 23, 5, 5, 1, 7, 5, 4]}, {"id": "HTan3", "name": "Howie Tan", "total": 98, "counts": [86, 0, 0, 4, 3, 2, 0, 1, 0, 0]}, {"id": "HFeng1", "name": "He Feng", "total": 96, "counts": [84, 0, 0, 3, 6, 1, 0, 0, 0, 1]}, {"id": "YWei29", "name": "Roy Wei", "total": 73, "counts": [13, 0, 1, 2, 2, 1, 0, 0, 0, 0]}, {"id": "LXIAN2", "name": "liang Xiang", "total": 73, "counts": [0, 73, 0, 0, 0, 0, 0, 0, 0, 0]}, {"id": "JDen4", "name": "Junfeng Deng", "total": 70, "counts": [48, 0, 0, 0, 1, 1, 0, 2, 0, 0]}, {"id": "PWan61", "name": "Ping Wang", "total": 70, "counts": [0, 65, 3, 0, 2, 0, 0, 0, 0, 0]}, {"id": "XZh302", "name": "Xinyu Zhang", "total": 65, "counts": [0, 57, 6, 0, 2, 0, 0, 0, 0, 0]}, {"id": "YDin23", "name": "Yang Ding", "total": 62, "counts": [0, 9, 53, 0, 0, 0, 0, 0, 0, 0]}, {"id": "KChu17", "name": "Kenneth Chung", "total": 59, "counts": [31, 0, 0, 9, 1, 4, 0, 0, 3, 0]}, {"id": "AXu72", "name": "Alex Xu", "total": 56, "counts": [36, 0, 3, 3, 3, 0, 6, 3, 0, 0]}, {"id": "RJu1", "name": "Rory Ju", "total": 55, "counts": [0, 0, 0, 33, 4, 2, 2, 2, 4, 1]}, {"id": "DCha49", "name": "Dom Chang", "total": 48, "counts": [0, 39, 6, 0, 0, 0, 0, 0, 0, 0]}, {"id": "HYip2", "name": "Harry Yip", "total": 48, "counts": [30, 0, 2, 8, 1, 1, 0, 0, 0, 0]}, {"id": "VCHE11", "name": "Vance Chen", "total": 47, "counts": [0, 0, 27, 10, 1, 0, 0, 0, 0, 0]}, {"id": "HZhu8", "name": "Hao Zhu", "total": 44, "counts": [0, 40, 3, 0, 0, 1, 0, 0, 0, 0]}, {"id": "CLe144", "name": "Charles Lee", "total": 42, "counts": [0, 0, 5, 8, 0, 8, 9, 4, 3, 0]}, {"id": "ALan2", "name": "Andy Lan", "total": 41, "counts": [0, 0, 17, 7, 3, 4, 3, 0, 0, 4]}, {"id": "KOuYan", "name": "Karen Ou Yang", "total": 39, "counts": [0, 0, 14, 4, 1, 2, 0, 1, 0, 1]}, {"id": "TTao5", "name": "Thomas Tao", "total": 35, "counts": [0, 0, 19, 6, 6, 2, 0, 1, 0, 0]}, {"id": "AGuo22", "name": "Allen Guo", "total": 31, "counts": [7, 0, 0, 3, 0, 0, 1, 0, 0, 0]}, {"id": "JCh603", "name": "Jacky Chan", "total": 31, "counts": [10, 0, 3, 8, 2, 1, 0, 0, 0, 0]}, {"id": "BLiu60", "name": "Bob Liu", "total": 30, "counts": [9, 0, 0, 6, 1, 0, 6, 0, 0, 1]}, {"id": "YWa456", "name": "Yibo Wang", "total": 30, "counts": [0, 0, 0, 5, 2, 8, 2, 0, 1, 0]}, {"id": "AJian3", "name": "Aaron Jiang", "total": 28, "counts": [14, 0, 0, 1, 1, 0, 2, 0, 0, 0]}, {"id": "L31", "name": "Lee Li", "total": 25, "counts": [1, 0, 19, 0, 0, 0, 0, 1, 2, 0]}, {"id": "JQIANG", "name": "Freddie Qiang", "total": 23, "counts": [0, 20, 0, 0, 3, 0, 0, 0, 0, 0]}, {"id": "LCh158", "name": "Luby Lu", "total": 13, "counts": [3, 0, 3, 1, 0, 4, 0, 1, 0, 0]}, {"id": "YY7", "name": "Yin Ye", "total": 8, "counts": [0, 0, 3, 0, 0, 0, 0, 1, 0, 0]}, {"id": "Z36", "name": "Zhi Lu", "total": 8, "counts": [8, 0, 0, 0, 0, 0, 0, 0, 0, 0]}, {"id": "YZh33", "name": "Yong Zhao", "total": 4, "counts": [0, 0, 4, 0, 0, 0, 0, 0, 0, 0]}, {"id": "GYo2", "name": "Guichong You", "total": 3, "counts": [3, 0, 0, 0, 0, 0, 0, 0, 0, 0]}], "colors": {"Mac": "#3b82f6", "Windows": "#f97316", "O365": "#8b5cf6", "Meeting Support": "#06b6d4", "Device (LC)": "#eab308", "Account / Auth": "#ec4899", "Daily Health Check": "#22c55e", "New Hire Setup": "#14b8a6", "NikePrint": "#a855f7", "Mobile": "#f43f5e", "Other": "#94a3b8"}};

(function() {
  const D = CATEGORY_DATA;
  if (!D.axes || !D.employees) return;

  const axes = D.axes;
  const emps = D.employees;
  const colorMap = D.colors || {};
  const fallback = '#94a3b8';

  const now = new Date();
  document.getElementById('monthLabel').textContent =
    now.toLocaleString('en-US', { month: 'long', year: 'numeric' });

  const activeEmps = emps.filter(function(e) { return e.total > 0; });
  const totalTickets = emps.reduce(function(s, e) { return s + e.total; }, 0);

  document.getElementById('totalVal').textContent = totalTickets;
  document.getElementById('catVal').textContent = axes.length;
  document.getElementById('empVal').textContent = activeEmps.length;

  // --- Team totals per category ---
  var teamCounts = axes.map(function(_, ai) {
    return emps.reduce(function(s, e) { return s + e.counts[ai]; }, 0);
  });
  var teamMax = Math.max.apply(null, teamCounts);

  // Team average percentages (across active employees)
  var teamAvgPcts = axes.map(function(_, ai) {
    if (activeEmps.length === 0) return 0;
    var sum = 0;
    activeEmps.forEach(function(e) {
      sum += (e.total > 0 ? e.counts[ai] / e.total * 100 : 0);
    });
    return Math.round(sum / activeEmps.length);
  });

  // --- Team overview radar ---
  var teamPcts = axes.map(function(_, ai) {
    return totalTickets > 0 ? Math.round(teamCounts[ai] / totalTickets * 100) : 0;
  });

  new Chart(document.getElementById('teamRadar').getContext('2d'), {
    type: 'radar',
    data: {
      labels: axes,
      datasets: [{
        data: teamPcts,
        borderColor: 'rgba(45, 212, 191, 0.9)',
        backgroundColor: 'rgba(45, 212, 191, 0.15)',
        borderWidth: 2.5,
        pointRadius: 4,
        pointBackgroundColor: 'rgba(45, 212, 191, 0.9)',
        pointBorderColor: '#1e293b',
        pointBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var i = ctx.dataIndex;
              return axes[i] + ': ' + teamCounts[i] + ' (' + teamPcts[i] + '%)';
            }
          },
          backgroundColor: '#1e293b', bodyColor: '#f1f5f9',
          borderColor: '#334155', borderWidth: 1, padding: 10,
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          ticks: { display: false, stepSize: 10 },
          grid: { color: 'rgba(148,163,184,0.12)' },
          angleLines: { color: 'rgba(148,163,184,0.12)' },
          pointLabels: { color: '#94a3b8', font: { size: 11, weight: '500' } }
        }
      }
    }
  });

  // --- Team category bars ---
  var barsEl = document.getElementById('teamBars');
  var catOrder = axes.map(function(c, i) { return { cat: c, count: teamCounts[i] }; })
                     .sort(function(a, b) { return b.count - a.count; });
  catOrder.forEach(function(item) {
    var pct = teamMax > 0 ? (item.count / teamMax * 100) : 0;
    var row = document.createElement('div');
    row.className = 'team-cat-row';
    row.innerHTML =
      '<span class="team-cat-dot" style="background:' + (colorMap[item.cat] || fallback) + '"></span>' +
      '<span class="team-cat-name">' + item.cat + '</span>' +
      '<div class="team-cat-bar-bg"><div class="team-cat-bar" style="width:' + pct + '%;background:' + (colorMap[item.cat] || fallback) + '"></div></div>' +
      '<span class="team-cat-count">' + item.count + '</span>';
    barsEl.appendChild(row);
  });

  // --- Individual cards ---
  var grid = document.getElementById('empGrid');
  activeEmps.forEach(function(emp, idx) {
    var card = document.createElement('div');
    card.className = 'emp-card';

    var pcts = emp.counts.map(function(c) { return emp.total > 0 ? Math.round(c / emp.total * 100) : 0; });

    card.innerHTML =
      '<div class="emp-top">' +
        '<span class="emp-name">' + emp.name + '</span>' +
        '<span class="emp-total">' + emp.total + ' tickets</span>' +
      '</div>' +
      '<div class="radar-wrap"><canvas id="radar' + idx + '"></canvas></div>' +
      '<div class="top-cats" id="topCats' + idx + '"></div>';
    grid.appendChild(card);

    // Top 3 categories
    var sorted = axes.map(function(a, i) { return { cat: a, count: emp.counts[i], pct: pcts[i] }; })
                     .filter(function(x) { return x.count > 0; })
                     .sort(function(a, b) { return b.count - a.count; });
    var topN = sorted.slice(0, 3);
    var tcEl = document.getElementById('topCats' + idx);
    topN.forEach(function(t, ri) {
      tcEl.innerHTML += '<span class="top-cat">' +
        t.cat + ' <span class="pct">' + t.pct + '%</span></span>';
    });

    // Radar chart with team average overlay
    var maxVal = Math.max(Math.max.apply(null, pcts), Math.max.apply(null, teamAvgPcts));
    var ctx = document.getElementById('radar' + idx).getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: axes,
        datasets: [
          {
            label: 'Team Avg',
            data: teamAvgPcts,
            borderColor: 'rgba(148,163,184,0.4)',
            backgroundColor: 'rgba(148,163,184,0.05)',
            borderWidth: 1.5,
            borderDash: [4, 3],
            pointRadius: 0,
            pointHitRadius: 0,
          },
          {
            label: emp.name,
            data: pcts,
            borderColor: 'rgba(45, 212, 191, 0.85)',
            backgroundColor: 'rgba(45, 212, 191, 0.15)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: 'rgba(45, 212, 191, 0.85)',
            pointBorderColor: '#1e293b',
            pointBorderWidth: 1,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            filter: function(item) { return item.datasetIndex === 1; },
            callbacks: {
              label: function(ctx) {
                var i = ctx.dataIndex;
                var diff = pcts[i] - teamAvgPcts[i];
                var sign = diff >= 0 ? '+' : '';
                return axes[i] + ': ' + emp.counts[i] + ' (' + pcts[i] + '%)  ' + sign + diff + '% vs avg';
              }
            },
            backgroundColor: '#1e293b', bodyColor: '#f1f5f9',
            titleColor: '#94a3b8',
            borderColor: '#334155', borderWidth: 1, padding: 10,
          }
        },
        scales: {
          r: {
            beginAtZero: true,
            max: Math.min(100, maxVal + 15),
            ticks: { display: false, stepSize: 20 },
            grid: { color: 'rgba(148,163,184,0.10)' },
            angleLines: { color: 'rgba(148,163,184,0.10)' },
            pointLabels: { color: '#64748b', font: { size: 9, weight: '500' } }
          }
        }
      }
    });
  });
})();
</script>
<script src="../chart.min.js" defer></script>
</body>
</html>
